<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>

<title>現金精算</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f0f4f8;min-height:100vh;font-size:14px}
nav{background:#1c1917;color:#fff;padding:0 16px;display:flex;align-items:center;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:700;padding:14px 0;margin-right:16px}
.tab{padding:14px 12px;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;color:#9ca3af}
.tab.on{color:#fff;border-bottom-color:#16a34a}
.wrap{max-width:800px;margin:0 auto;padding:20px 16px 80px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ct{font-size:15px;font-weight:700;margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:#6b7280;margin-bottom:4px;margin-top:12px}
label:first-child{margin-top:0}
input,select{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit;outline:none}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:12px}
.bg{background:#16a34a;color:#fff}
.bw{background:#f3f4f6;color:#374151}
.bd{background:#e5e7eb;color:#9ca3af;cursor:not-allowed}
.upload{border:2px dashed #d1d5db;border-radius:12px;padding:32px 16px;text-align:center;cursor:pointer}
.irow{background:#f9fafb;border-radius:8px;padding:12px;margin-bottom:8px}
.ttag{background:#dbeafe;color:#2563eb;border-radius:4px;padding:2px 8px;font-size:11px;display:inline-block;margin-bottom:6px}
.mwrap{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mbtn{padding:14px;border:2px solid #e5e7eb;border-radius:10px;background:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%}
.mn{border-color:#16a34a;background:#f0fdf4;color:#16a34a}
.ml{border-color:#d97706;background:#fffbeb;color:#d97706}
.tbox{background:#f9fafb;border-radius:8px;padding:12px;margin-top:8px}
.tr{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}

/* 管理画面フィルター */

<script>
var APPS = JSON.parse(localStorage.getItem('apps')||'[]');
var DEPOSITS = JSON.parse(localStorage.getItem('deposits')||'[]');
var CARRYOVER = localStorage.getItem('carryover') !== null ? Number(localStorage.getItem('carryover')) : 100000; // 前月繰越（初期値10万円、締め処理後は保存値を使用）
var GAS_URL = 'https://script.google.com/macros/s/AKfycbzODAPUfKtnqxmDbPeKRZz9eMB3vXlxIPSlj_mdIlon-ODIOq2b1Or6ThhhnXuMcZ_vyg/exec';

// ---- パスワード設定（ここを変更してください） ----
var ADMIN_PASSWORD = '1234';
// -------------------------------------------------

var ADMIN_MODE = false;
var CURRENT_FILTER = 'all';

function tryAdmin(){
  if(ADMIN_MODE){ showTab(2); return; }
  document.getElementById('pw-ov').classList.add('active');
  document.getElementById('pw-input').value='';
  document.getElementById('pw-err').textContent='';
  setTimeout(function(){ document.getElementById('pw-input').focus(); }, 100);
}

document.getElementById('pw-input').addEventListener('keydown', function(e){
  if(e.key==='Enter') checkPw();
});

function checkPw(){
  var val = document.getElementById('pw-input').value;
  if(val === ADMIN_PASSWORD){
    closePw();
    enterAdmin();
  } else {
    document.getElementById('pw-err').textContent = 'パスワードが違います';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}

function closePw(){
  document.getElementById('pw-ov').classList.remove('active');
}

function enterAdmin(){
  ADMIN_MODE = true;
  var t2 = document.getElementById('t2');
  t2.style.display = 'block';
  var btn = document.getElementById('admin-toggle-btn');
  btn.textContent = 'ログアウト';
  btn.style.color = '#16a34a';
  btn.style.borderColor = '#16a34a';
  btn.onclick = logoutAdmin;
  showTab(2);
}

function logoutAdmin(){
  ADMIN_MODE = false;
  var t2 = document.getElementById('t2');
  t2.style.display = 'none';
  var btn = document.getElementById('admin-toggle-btn');
  btn.textContent = '管理';
  btn.style.color = '#9ca3af';
  btn.style.borderColor = '#4b5563';
  btn.onclick = tryAdmin;
  showTab(1);
}

// スプレッドシートに保存
function saveToSheet(app) {
  var data = Object.assign({action:'save'}, app);
  delete data.img;
  if(data.receipts) data.receipts = data.receipts.map(function(r){
    var r2 = Object.assign({},r); delete r2.b64; return r2;
  });
  fetch(GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(data)
  }).catch(function(e){console.log('Sheet save error:', e);});
}

function updateSheet(id, updates) {
  var data = Object.assign({action:'update', id:id}, updates);
  fetch(GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(data)
  }).catch(function(e){console.log('Sheet update error:', e);});
}

function loadFromSheet(cb) {
  fetch(GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({action:'load'})
  })
  .then(function(r){return r.json();})
  .then(function(d){if(d.ok) cb(d); else cb(null);})
  .catch(function(e){console.log('Sheet load error:', e); cb(null);});
}

function fmtDateJP(s){

function compressImage(dataUrl, mime, maxW, quality, cb){
  var img = new Image();
  img.onload = function(){
    var w = img.width, h = img.height;
    if(w > maxW){ h = Math.round(h * maxW / w); w = maxW; }
    var cv = document.createElement('canvas');
    cv.width = w; cv.height = h;
    cv.getContext('2d').drawImage(img, 0, 0, w, h);
    var out = cv.toDataURL('image/jpeg', quality);
    cb(out, 'image/jpeg');
  };
  img.src = dataUrl;
}

function addFiles(files){
  Array.prototype.forEach.call(files, function(f){
    if(!f.type.startsWith('image/')) return;
    var r = new FileReader();
    r.onload = function(e){
      var original = e.target.result;
      // 最大幅1200px・品質0.7で圧縮（容量を約1/5〜1/10に削減）
      compressImage(original, f.type, 1200, 0.70, function(compressed, mime){
        RECEIPTS.push({b64:compressed.split(',')[1], mime:mime, preview:compressed, data:null});
        renderThumbs();
      });
    };
    r.readAsDataURL(f);
  });
}

function recalcTot(ri){
  // 明細の合計を計算
  var itemsSum=0, i=0;
  while(true){
    var el=document.getElementById('r'+ri+'am'+i);
    if(!el) break;
    var v=parseInt(el.value,10);
    itemsSum+=isNaN(v)?0:v;
    i++;
  }
  // 小計はAPIの値（data-originalに保持）、警告エリアで差分を表示
  var warnEl=document.getElementById('r'+ri+'warn');
  var apiTotal=parseInt(document.getElementById('r'+ri+'tot').getAttribute('data-original'),10)||0;
  if(warnEl){
    var diff=itemsSum-apiTotal;
    if(diff!==0){
      warnEl.style.display='block';
      warnEl.textContent='⚠️ 明細合計（¥'+fmt(itemsSum)+'）と小計（¥'+fmt(apiTotal)+'）が¥'+fmt(Math.abs(diff))+(diff>0?'多い':'少ない')+'です。値引きをご確認ください。';
    } else {
      warnEl.style.display='none';
    }
  }
}

    Object.keys(existingMonths).forEach(function(m){

    });
    // 今回の申請の精算日（今すぐ精算=今日、後で精算=後で確定）が既存の月と違う月になる可能性
    if(method==='now' && dominantMonth && dominantMonth !== currentMonth){
      var dp = dominantMonth.split('-');
      var cp = currentMonth.split('-');
      if(!confirm(dp[0]+'年'+parseInt(dp[1],10)+'月の申請が既にあります。\n今日（'+cp[0]+'年'+parseInt(cp[1],10)+'月）に精算すると月をまたぎます。\n先に締め処理を行ってください。\n\nこのまま申請しますか？')){return;}
    }

    var signData=null;
    if(method==='now'){try{signData=$e('cvs').toDataURL();}catch(e){}}
    var receiptsSnap = RECEIPTS.map(function(r,ri){
      var d=r.data||{};
      return {
        store:$e('r'+ri+'store').value,
        date:$e('r'+ri+'date').value,
        invoice:$e('r'+ri+'inv').value,
        items:(d.items||[]).map(function(it,i){
          var acEl=$e('r'+ri+'ac'+i);
          var nmEl=$e('r'+ri+'nm'+i);
          var amEl=$e('r'+ri+'am'+i);
          var amt=amEl?(isNaN(parseInt(amEl.value,10))?0:parseInt(amEl.value,10)):it.amount;
          return {name:nmEl?nmEl.value:it.name, amount:amt, tax_category:it.tax_category, account:acEl?acEl.value:'雑費'};
        }),
        tax_8:d.tax_8,tax_10:d.tax_10,
        total:d.total,
        b64:r.b64,mime:r.mime
      };
    });
    var fixedGrandTotal = RECEIPTS.reduce(function(r,rc){return r+(rc.data?rc.data.total||0:0);},0);
    showConfirm({
      person:person,
      receipts:receiptsSnap,
      grandTotal:fixedGrandTotal,
      method:method,
      status:method==='now'?'paid':'unsigned',
      sign:signData,
      settlement_date:method==='now'?today():null
    });
  };
}

function rA(){
  // 読み込み中スピナー表示
  var al = $e('al');
  if(al) al.innerHTML = '<div style="text-align:center;padding:40px 0"><div class="spin"></div><div style="color:#9ca3af;font-size:13px;margin-top:8px">データ取得中...</div></div>';

  // GASから申請データ・繰越額を取得（最も信頼できるソース）
  loadFromSheet(function(res){
    if(res){
      // 締め日以降のデータのみGASが返す
      APPS = res.data || [];
      // GASの設定シートから繰越額を反映
      if(res.carryover !== undefined){
        CARRYOVER = Number(res.carryover);
        localStorage.setItem('carryover', String(CARRYOVER));
      }
      // 申請IDの連番をGASと同期（大きい方を採用）
      if(res.last_seq !== undefined){
        var localSeq = Number(localStorage.getItem('last_seq')||0);
        var gasSeq = Number(res.last_seq);
        var maxSeq = Math.max(localSeq, gasSeq);
        localStorage.setItem('last_seq', String(maxSeq));
      }
    } else {
      // GAS通信失敗時はlocalStorageにフォールバック
      var savedCarryover = localStorage.getItem('carryover');
      if(savedCarryover !== null) CARRYOVER = Number(savedCarryover);
    }
    sv();

    fetch(GAS_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'loadDeposits'})
    })
    .then(function(r){return r.json();})
    .then(function(d){
      // 入金も完全上書き
      DEPOSITS = (d.ok && d.data) ? d.data : [];
      localStorage.setItem('deposits', JSON.stringify(DEPOSITS));
      renderAdminList();
    })
    .catch(function(e){
      console.log('Deposit load error:', e);
      renderAdminList();
    });
  });
}

function calcBalance(){
  var depositSum = DEPOSITS.reduce(function(s,d){return s+(d.amount||0);},0);
  var expenseSum = APPS.filter(isPaid).reduce(function(s,a){return s+(a.total||0);},0);
  return {
    balance: CARRYOVER + depositSum - expenseSum,
    depositSum: depositSum,
    expenseSum: expenseSum
  };
}

function buildSeisanshoHTML(a){
  function toReiwa(dateStr){
    if(!dateStr) return '';
    var d = new Date(dateStr);
    var reiwa = d.getFullYear() - 2018;
    return '令和'+reiwa+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
  }
  function mdLabel(dateStr){
    if(!dateStr) return '';
    try{var d=new Date(dateStr);return (d.getMonth()+1)+'月'+d.getDate()+'日';}catch(e){return dateStr;}
  }

  var dateStr = a.settlement_date || a.date || today();
  var receipts = (a.receipts && a.receipts.length > 0) ? a.receipts : [{
    store: a.store, date: dateStr, items: a.items||[], total: a.total
  }];

  // レシートごとに1行：取引日・勘定科目（店名）・金額
  var itemRows = '';
  receipts.forEach(function(r){
    var txDate = mdLabel(r.date || dateStr);
    // 勘定科目を集約（複数あれば最初のものを代表に）
    var accounts = [];
    if(r.items && r.items.length > 0){
      r.items.forEach(function(it){
        var ac = it.account||'雑費';
        if(accounts.indexOf(ac) < 0) accounts.push(ac);
      });
    }
    var accountLabel = accounts.length > 0 ? accounts.join('・') : '雑費';
    var content = accountLabel + (r.store ? '（'+r.store+'）' : '');
    itemRows +=
      '<tr>'+
      '<td style="border:1px solid #555;padding:3px 6px;text-align:center;white-space:nowrap">'+txDate+'</td>'+
      '<td style="border:1px solid #555;padding:3px 6px">'+content+'</td>'+
      '<td style="border:1px solid #555;padding:3px 6px;text-align:right;white-space:nowrap">¥'+fmt(r.total||0)+'</td>'+
      '</tr>';
  });

  var signData = (a.sign && a.sign.startsWith('data:')) ? a.sign
               : (a.client_sign && a.client_sign.startsWith('data:')) ? a.client_sign
               : null;
  var signEl = signData
    ? '<img src="'+signData+'" style="height:42px;max-width:200px;object-fit:contain;display:inline-block;vertical-align:middle"/>'
    : '';

  return (
    '<div style="position:relative;padding:0;font-size:11px;line-height:1.4;color:#000;font-family:\'Noto Sans JP\',sans-serif">'+
    '<div style="text-align:center;font-size:16px;font-weight:700;letter-spacing:6px;margin-bottom:5px">《 精　算　書 》</div>'+
    '<div style="font-size:11px;margin-bottom:2px">イソベ石油株式会社　御中</div>'+
    '<div style="font-size:11px;margin-bottom:5px;border-bottom:1px solid #000;padding-bottom:2px">'+
      '<span style="font-size:13px;font-weight:700">'+
      (function(){var d=new Date(dateStr);return d.getMonth()+1;})()+
      '月'+(function(){var d=new Date(dateStr);return d.getDate();})()+
      '日</span>　〜　　　月　　　日'+
    '</div>'+
    '<table style="width:100%;border-collapse:collapse;font-size:10.5px;margin-bottom:6px;table-layout:fixed">'+
      '<colgroup><col style="width:54px"/><col/><col style="width:72px"/></colgroup>'+
      '<thead><tr style="background:#fff">'+
        '<th style="border:1px solid #555;padding:3px 4px;text-align:center">取引日</th>'+
        '<th style="border:1px solid #555;padding:3px 4px;text-align:center">内　訳</th>'+
        '<th style="border:1px solid #555;padding:3px 4px;text-align:center">金　額</th>'+
      '</tr></thead>'+
      '<tbody>'+itemRows+'</tbody>'+
      '<tfoot><tr>'+
        '<td colspan="2" style="border:1px solid #555;padding:4px 8px;font-weight:700;text-align:right;font-size:12px">合計金額</td>'+
        '<td style="border:1px solid #555;padding:4px 8px;text-align:right;font-weight:700;font-size:12px">¥'+fmt(a.total)+'</td>'+
      '</tr></tfoot>'+
    '</table>'+
    '<div style="text-align:center;font-size:11px;margin-bottom:2px">'+toReiwa(dateStr)+'</div>'+
    '<div style="font-size:11px;margin-bottom:5px">上記合計金額正に受領いたしました。</div>'+
    '<div style="display:flex;align-items:flex-end;gap:8px">'+
      '<div style="font-size:11px;white-space:nowrap">精算者氏名</div>'+
      '<div style="border-bottom:1.5px solid #000;min-width:160px;padding-bottom:2px;display:flex;align-items:flex-end">'+
        (signEl ? signEl : '<span style="font-size:13px;font-weight:700">'+a.person+'</span>')+
      '</div>'+
    '</div>'+
    '<div style="position:absolute;bottom:2px;right:8px;font-size:9px;color:#aaa">'+a.id+'</div>'+
    '</div>'
  );
}

      var badge = isIn
        ? '<span style="background:#dbeafe;color:#2563eb;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700">入金</span>'
        : '<span style="background:#fee2e2;color:#dc2626;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700">出金</span>';
      var onclick = isIn ? '' : ' onclick="shD(\''+row.id+'\')"';
      return '<div class="li"'+onclick+' style="'+(isIn?'':'cursor:pointer')+'">' +
        '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<div><div style="font-size:12px;color:#9ca3af">'+row.date+'　'+badge+'</div>' +
        '<div style="font-weight:600;margin-top:4px">'+row.desc+'</div></div>' +
        '<div style="text-align:right;font-weight:700;font-size:16px;color:'+amtColor+'">'+amtPrefix+'¥'+fmt(row.amount)+'</div>' +
        '</div></div>';
    }).join('');
    return;
  }

  // 通常フィルター
  if(!APPS.length){
    el.innerHTML='<p style="color:#9ca3af;text-align:center;padding:24px">申請はありません</p>';
    return;
  }
  var filtered = APPS.slice().reverse().filter(function(a){
    if(CURRENT_FILTER==='all') return true;
    if(CURRENT_FILTER==='paid') return isPaid(a);
    if(CURRENT_FILTER==='unsigned') return a.status!=='paid'&&a.status!=='精算済'&&a.status!=='signed';
    return true;
  });
  if(!filtered.length){
    el.innerHTML='<p style="color:#9ca3af;text-align:center;padding:24px">該当する申請はありません</p>';
    return;
  }
  el.innerHTML=filtered.map(function(a){
    var rcptCount = a.receipts ? a.receipts.length : 1;
    return '<div class="li" onclick="shD(\''+a.id+'\')">'+
      '<div style="display:flex;justify-content:space-between">'+
      '<div><div style="font-size:12px;color:#9ca3af">'+fmtDateJP(a.date)+'</div><div style="font-weight:600;margin-top:2px">'+a.person+'　'+rcptCount+'件レシート清算</div></div>'+
      '<div style="text-align:right"><div style="font-weight:700;color:#dc2626;font-size:16px">¥'+fmt(a.total)+'</div>'+stLabel(a.status)+'</div></div>'+
      '<div style="font-size:11px;color:#9ca3af;margin-top:6px">'+a.id+'</div></div>';
  }).join('');
}

function shD(id){
  var a=APPS.find(function(x){return x.id===id;});if(!a)return;

  var receiptDetail='';
  if(a.receipts&&a.receipts.length>0){
    receiptDetail=a.receipts.map(function(r,ri){
      var itemRows=(r.items||[]).map(function(it){
        return '<tr><td>'+it.name+'</td><td>'+(it.account||'—')+'</td><td>'+(it.tax_category||'—')+'</td><td style="text-align:right">¥'+fmt(it.amount)+'</td></tr>';
      }).join('');
      return '<div style="margin-bottom:12px">'+
        '<div class="rbadge">レシート '+(ri+1)+'</div>'+
        '<div style="font-size:12px;color:#6b7280;margin:4px 0 6px">'+r.store+'　'+r.date+(r.invoice?'　'+r.invoice:'')+'</div>'+
        '<table class="tbl"><thead><tr><th>商品名</th><th>勘定科目</th><th>税区分</th><th>金額</th></tr></thead><tbody>'+itemRows+'</tbody></table>'+
        '<div style="text-align:right;font-size:13px;font-weight:700;margin-top:6px;color:#dc2626">小計: ¥'+fmt(r.total)+'</div>'+
        (r.b64?'<img src="data:'+r.mime+';base64,'+r.b64+'" style="width:100%;border-radius:8px;margin-top:8px"/>':'')+
        '</div>';
    }).join('<hr/>');
  } else {
    var rows=(a.items||[]).map(function(it){return '<tr><td>'+it.name+'</td><td>'+(it.account||'—')+'</td><td>'+(it.tax_category||'—')+'</td><td style="text-align:right">¥'+fmt(it.amount)+'</td></tr>';}).join('');
    receiptDetail='<table class="tbl"><thead><tr><th>商品名</th><th>勘定科目</th><th>税区分</th><th>金額</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }

  var signSection='';
  if(!isPaid(a)){
    if(a.client_sign){
      signSection=
        '<hr/>'+
        '<div style="font-size:13px;font-weight:700;margin-bottom:8px">電子サイン（顧問先）</div>'+
        '<img src="'+a.client_sign+'" style="border:1px solid #e5e7eb;border-radius:8px;width:100%;max-height:100px;object-fit:contain"/>'+
        '<div style="font-size:11px;color:#9ca3af;margin-top:4px">署名日時：'+(a.client_signed_at||'')+'</div>'+
        '<hr/>'+
        '<button class="btn bg" id="paybtn">現金精算を完了する</button>';
    } else {
      signSection=
        '<hr/><div class="sign-box">'+
        '<div style="font-size:13px;font-weight:700;margin-bottom:8px">電子サイン（顧問先）</div>'+
        '<p style="font-size:12px;color:#6b7280;margin-bottom:10px">現金精算前に署名してください</p>'+
        '<canvas id="ccvs" height="120" style="border:2px solid #e5e7eb;border-radius:8px;width:100%;touch-action:none;cursor:crosshair;background:#fff;display:block"></canvas>'+
        '<div style="display:flex;gap:8px;margin-top:8px;align-items:center">'+
        '<button id="cclr" style="padding:6px 12px;background:#f3f4f6;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600">クリア</button>'+
        '<span id="csl" style="display:none;font-size:12px;color:#16a34a;font-weight:600">✓ 署名済み</span>'+
        '</div>'+
        '<button class="btn bg" id="savesignbtn" style="margin-top:12px">署名を保存する</button>'+
        '</div><hr/>'+
        '<button class="btn bd" id="paybtn" disabled>現金精算を完了する</button>'+
        '<p style="font-size:11px;color:#9ca3af;text-align:center;margin-top:6px">※電子サイン完了後に精算できます</p>';
    }
  } else {
    // 精算完了済み → 印刷ボタン
    signSection =
      '<hr/>'+
      '<button class="btn" onclick="clsM();openPrintModal(\''+a.id+'\')" style="background:#1c1917;color:#fff;font-size:14px;font-weight:700;border:none;border-radius:8px;padding:14px;width:100%;cursor:pointer;font-family:inherit;margin-top:4px">🖨 精算書を印刷する</button>';
  }

  $e('mb').innerHTML=
    '<div class="banner" style="margin-bottom:16px">'+
    '<div style="font-size:11px;color:#9ca3af;margin-bottom:2px">合計金額</div>'+
    '<div style="font-size:24px;font-weight:700">¥'+fmt(a.total)+'</div>'+
    '<div style="font-size:11px;color:#9ca3af;margin-top:4px">精算日：<b style="color:#fff">'+(a.settlement_date?fmtDateJP(a.settlement_date):'未精算')+'</b></div>'+
    '</div>'+
    '<div class="idb"><div style="font-size:11px;color:#9ca3af;margin-bottom:6px">申請ID</div><div style="font-size:18px;font-weight:700;letter-spacing:2px">'+a.id+'</div></div>'+
    '<div style="margin-bottom:12px;text-align:center">'+stLabel(a.status)+'</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;font-size:13px">'+
    '<div><span style="color:#9ca3af">申請者</span><br><b>'+a.person+'</b></div>'+
    '<div><span style="color:#9ca3af">申請日</span><br><b>'+fmtDateJP(a.date)+'</b></div>'+
    '</div><hr/>'+
    receiptDetail+
    (a.sign&&a.sign.startsWith('data:')
      ?'<hr/><div style="font-size:12px;font-weight:600;color:#6b7280;margin-bottom:8px">電子サイン（申請者）</div><img src="'+a.sign+'" style="border:1px solid #e5e7eb;border-radius:8px;width:100%;max-height:100px;object-fit:contain"/>'
      :'')+
    signSection;

  $e('ov').style.display='block';

  var paybtn=$e('paybtn');
  if(paybtn){
    paybtn.onclick=function(){
      if(paybtn.disabled)return;
      a.status='paid';
      a.paid_at=new Date().toISOString();
      sv();
      updateSheet(a.id, {status:'paid'});
      clsM();renderAdminList();
      alert('精算完了しました');
    };
  }

  if(!a.client_sign&&!isPaid(a)){
    var cv=$e('ccvs');
    if(cv){
      cv.width=cv.parentElement.offsetWidth-32;
      var csigned=false,cdr=false;
      var ctx=cv.getContext('2d');
      ctx.strokeStyle='#1c1917';ctx.lineWidth=2;ctx.lineCap='round';
      function cxy(e){var r=cv.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};}
      cv.onmousedown=cv.ontouchstart=function(e){e.preventDefault();cdr=true;var p=cxy(e);ctx.beginPath();ctx.moveTo(p.x,p.y);};
      cv.onmousemove=cv.ontouchmove=function(e){e.preventDefault();if(!cdr)return;var p=cxy(e);ctx.lineTo(p.x,p.y);ctx.stroke();csigned=true;$e('csl').style.display='inline';};
      cv.onmouseup=cv.ontouchend=function(){cdr=false;};
      $e('cclr').onclick=function(){ctx.clearRect(0,0,cv.width,cv.height);csigned=false;$e('csl').style.display='none';};
      $e('savesignbtn').onclick=function(){
        if(!csigned){alert('署名を記入してください');return;}
        var now=new Date();
        a.client_sign=cv.toDataURL();
        a.client_signed_at=now.toLocaleString('ja-JP');
        a.settlement_date=now.toISOString().slice(0,10);
        a.status='signed';
        sv();
        updateSheet(a.id, {status:'signed', settlement_date:a.settlement_date, client_sign:a.client_sign, client_signed_at:a.client_signed_at});
        clsM();shD(id);renderAdminList();
      };
    }
  }
}

function clsM(){$e('ov').style.display='none';}

function openCloseModal(){
  var b = calcBalance();
  $e('cm-carry').textContent = '¥'+fmt(CARRYOVER);
  $e('cm-dep').textContent = '¥'+fmt(b.depositSum);
  $e('cm-exp').textContent = '¥'+fmt(b.expenseSum);
  $e('cm-bal').textContent = '¥'+fmt(b.balance);
  $e('cm-bal').style.color = b.balance >= 0 ? '#16a34a' : '#dc2626';
  // 対象月 = 精算日（settlement_date）の最多月
  var targetMonth = '';
  if(APPS.length > 0){
    var monthCount = {};
    APPS.forEach(function(a){
      var m = (a.settlement_date || '').slice(0,7);
      if(m) monthCount[m] = (monthCount[m]||0) + 1;
    });
    var maxCount = 0;
    Object.keys(monthCount).forEach(function(m){
      if(monthCount[m] > maxCount){ maxCount = monthCount[m]; targetMonth = m; }
    });
  }
  if(!targetMonth){
    var now = new Date();
    var y = now.getMonth()===0 ? now.getFullYear()-1 : now.getFullYear();
    var m = now.getMonth()===0 ? 12 : now.getMonth();
    targetMonth = y+'-'+('0'+m).slice(-2);
  }
  var parts = targetMonth.split('-');
  $e('close-month-label').textContent = parts[0]+'年'+parseInt(parts[1],10)+'月';
  $e('close-month-label').setAttribute('data-month', targetMonth);
  $e('close-step1').style.display='block';
  $e('close-step2').style.display='none';
  $e('close-ov').style.display='block';
}

function closeCloseModal(){
  $e('close-ov').style.display='none';
}

function execClose(){
  var month = $e('close-month-label').getAttribute('data-month');
  if(!month){alert('対象月が取得できません');return;}
  var b = calcBalance();
  var newCarryover = b.balance;

  // GASに締め処理を送信
  fetch(GAS_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({
      action:'monthClose',
      month: month,
      carryover: CARRYOVER,
      depositSum: b.depositSum,
      expenseSum: b.expenseSum,
      newCarryover: newCarryover,
      apps: APPS.map(function(a){return {id:a.id,date:a.date,person:a.person,store:a.store,total:a.total,status:a.status,settlement_date:a.settlement_date};}),
      deposits: DEPOSITS
    })
  }).catch(function(){});

  // 繰越額を新残高に更新
  CARRYOVER = newCarryover;
  localStorage.setItem('carryover', String(CARRYOVER));

  // 締め処理日時を記録（これ以前のGASデータは再読み込みしない）
  var closeAt = new Date().toISOString();
  localStorage.setItem('last_close_at', closeAt);

  // 申請・入金履歴をリセット
  APPS = [];
  DEPOSITS = [];
  sv();
  localStorage.setItem('deposits','[]');

  // 完了表示
  $e('close-step1').style.display='none';
  $e('close-step2').style.display='block';
  $e('close-done-msg').textContent =
    month.replace('-','年')+'月 の締めが完了しました。\n次月繰越額：¥'+fmt(newCarryover);

  // UIを更新
  setTimeout(function(){
    renderAdminList();
  }, 300);
}

function dlCSV(){
  function esc(v){var s=String(v==null?'':v);return(s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0)?'"'+s.replace(/"/g,'""')+'"':s;}
  function stJa(s){
    if(s==='paid'||s==='精算済') return '精算完了';
    if(s==='signed') return 'サイン済（未精算）';
    return '未精算';
  }
  function fmtDate(dateStr){
    if(!dateStr) return '';
    try{var d=new Date(dateStr);if(isNaN(d.getTime()))return dateStr;return(d.getMonth()+1)+'/'+(d.getDate());}catch(e){return dateStr;}
  }

  var rows = [['日付','申請者','内容','金額','精算ステータス']];

  // 前月繰越
  rows.push(['－','－','【前月繰越】', CARRYOVER, '－']);

  // 申請データ（申請単位・総額）
  APPS.forEach(function(a){
    var csvDate = fmtDate(a.settlement_date || a.date);
    var rcptCount = a.receipts ? a.receipts.length : 1;
    rows.push([csvDate, a.person, rcptCount+'件レシート精算', -a.total, stJa(a.status)]);
  });

  // 入金データ
  DEPOSITS.forEach(function(d){
    rows.push([fmtDate(d.date), '－', '入金'+(d.memo?'（'+d.memo+'）':''), d.amount, '－']);
  });

  // 日付昇順ソート（ヘッダーと前月繰越除く）
  var header = rows.shift();
  var carryRow = rows.shift();
  rows.sort(function(a,b){return String(a[0]).localeCompare(String(b[0]));});

  // 残高計算
  var b = calcBalance();
  rows.push(['－','－','【残高】', b.balance, '－']);

  rows.unshift(carryRow);
  rows.unshift(header);

  if(rows.length <= 2){alert('出力するデータがありません');return;}
  var csv = '\uFEFF' + rows.map(function(r){return r.map(esc).join(',');}).join('\n');
  var link = document.createElement('a');
  link.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  link.download = '入出金明細_'+today()+'.csv';
  link.click();
}

function openReceiptTray(){
  var paid = APPS.filter(function(a){ return isPaid(a); });
  if(!paid.length){ alert('精算完了の申請がありません'); return; }

  // A4縦 2列×3行、各枠をA6相当に
  var cols = 2, rows = 3, perPage = cols * rows;
  var pages = [];
  for(var i=0; i<paid.length; i+=perPage){
    pages.push(paid.slice(i, i+perPage));
  }

  var pageHTML = pages.map(function(pageApps){
    var cells = '';
    for(var ci=0; ci<perPage; ci++){
      var a = pageApps[ci];
      if(a){
        var rcptCount = a.receipts ? a.receipts.length : 1;
        var stores = a.receipts ? a.receipts.map(function(r){return r.store||'';}).filter(Boolean).join('・') : (a.store||'');

          '<div class="tray-cell">'+

            '<div class="tray-id">'+a.id+'</div>'+

              '<span class="tray-person">'+a.person+'</span>'+
              '<span class="tray-date">'+(a.settlement_date||a.date||'')+'</span>'+

            '<div class="tray-store">'+stores+'</div>'+

          '</div>';

        cells += '<div class="tray-cell tray-empty"></div>';

    }

  }).join('');

  var html = '<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"/>'+

    '<style>'+
    '@import url(\'https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap\');'+
    '*{box-sizing:border-box;margin:0;padding:0}'+
    'body{font-family:\'Noto Sans JP\',sans-serif;background:#fff;color:#000}'+
    '.no-print{text-align:center;padding:16px;background:#f3f4f6}'+
    '.no-print button{padding:10px 28px;background:#1c1917;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin:0 6px}'+
    '.no-print .sub{font-size:12px;color:#6b7280;margin-top:8px}'+
    '.tray-page{display:grid;grid-template-columns:1fr 1fr;gap:0;width:210mm;min-height:297mm;padding:8mm;page-break-after:always;border-bottom:1px dashed #ccc}'+
    '.tray-cell{border:2px dashed #374151;border-radius:4px;margin:4mm;display:flex;flex-direction:column;min-height:128mm;overflow:hidden}'+
    '.tray-cell.tray-empty{border-color:#e5e7eb}'+
    '.tray-header{background:#1c1917;color:#fff;padding:6px 10px}'+
    '.tray-id{font-size:11px;font-weight:700;letter-spacing:1px;color:#86efac;margin-bottom:3px}'+
    '.tray-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}'+
    '.tray-person{font-size:14px;font-weight:700}'+
    '.tray-date{font-size:10px;color:#9ca3af}'+
    '.tray-store{font-size:10px;color:#d1d5db;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}'+
    '.tray-amount{font-size:16px;font-weight:700;color:#fde68a}'+
    '.tray-count{font-size:10px;color:#9ca3af;font-weight:400}'+
    '.tray-space{flex:1;display:flex;align-items:center;justify-content:center;background:#fafafa}'+
    '.tray-hint{font-size:10px;color:#d1d5db;letter-spacing:1px}'+
    '@media print{'+
    '.no-print{display:none!important}'+
    '.tray-page{page-break-after:always;border:none}'+
    'body{-webkit-print-color-adjust:exact;print-color-adjust:exact}'+
    '}'+
    '</style></head><body>'+
    '<div class="no-print">'+
      '<button onclick="window.print()">🖨 印刷する</button>'+
      '<button onclick="window.close()">✕ 閉じる</button>'+
      '<div class="sub">精算完了 '+paid.length+'件 ／ '+pages.length+'ページ</div>'+
    '</div>'+
    pageHTML+
    '</body></html>';

  var win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
}

showUpload();
(function initSeqSync(){
  fetch(GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({action:'load'})
  })
  .then(function(r){return r.json();})
  .then(function(res){
    if(res && res.last_seq !== undefined){
      var localSeq = Number(localStorage.getItem('last_seq')||0);
      var gasSeq   = Number(res.last_seq);
      var maxSeq   = Math.max(localSeq, gasSeq);
      localStorage.setItem('last_seq', String(maxSeq));
    }
  })
  .catch(function(){});
})();
